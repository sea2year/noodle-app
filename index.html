<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>重庆小面</title>
<script>
(function(){
  var W=402,H=874;
  function scale(){ var s=Math.min((window.innerWidth||screen.width||W)/W,(window.innerHeight||screen.height||H)/H); document.documentElement.style.setProperty('--as',s); document.documentElement.style.setProperty('--ah',Math.round(H*s)+'px'); }
  scale(); window.addEventListener('resize',scale); window.addEventListener('orientationchange',function(){setTimeout(scale,100);});
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; overflow-x:hidden; -webkit-tap-highlight-color:transparent; }
body {
  background:#000;
  display:flex; justify-content:center; align-items:flex-start;
  min-height:var(--ah, 874px);
  padding-top:env(safe-area-inset-top, 0px);
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
.app {
  width:402px; height:874px;
  position:relative; overflow:hidden;
  background:#000;
  flex-shrink:0;
  zoom:var(--as, 1);
  user-select:none; -webkit-user-select:none;
}

/* ===== Full Background Image ===== */
.bg-photo {
  position:absolute; left:0; top:0;
  width:402px; height:874px;
  z-index:0;
}
.bg-photo img {
  width:100%; height:100%;
  object-fit:cover;
}

.app-content {
  position:relative; z-index:0;
}
/* Scale entrance — only when .enter is present (custom path) */
.app.enter {
  animation: pageEnter 3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
}
@keyframes pageEnter {
  from { transform: scale(0.85); }
  to   { transform: scale(1); }
}

/* Dark overlay — covers background but sits below 浇头 */
.bg-overlay {
  position:absolute; left:0; top:0;
  width:402px; height:874px;
  background:rgba(0,0,0,0.55);
  z-index:6; pointer-events:none;
  opacity:0;
}
.app.enter .bg-overlay {
  animation: darkenThenLift 4s ease forwards;
}
@keyframes darkenThenLift {
  0%   { opacity:0; }
  15%  { opacity:1; }
  70%  { opacity:1; }
  100% { opacity:0; }
}

/* ===== Text Labels ===== */
.price-tag {
  position:absolute; left:333px; top:161px;
  font-family:'Inter','PingFang SC','Hiragino Sans GB',sans-serif;
  font-size:55px; font-weight:900; /* black */
  color:#CA2626;
  -webkit-text-stroke:3px #FFFFFF;
  paint-order:stroke fill;
  z-index:4; pointer-events:none;
}
.price-tag.pop { animation: pricePop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pricePop { 0%{transform:scale(1.3)} 100%{transform:scale(1)} }
.sec-label {
  position:absolute; font-size:16px; font-weight:600;
  z-index:5; pointer-events:none;
}
.sec-label.white { color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.5); }
.sec-label.red { color:#CA2626; }

/* ===== Figma Segmented Pill Controls ===== */
.seg-control {
  position:absolute; z-index:7;
  display:flex; align-items:center;
  overflow:hidden; cursor:pointer;
  border-radius:999px;
}
.seg-control::before {
  content:'';
  position:absolute; inset:-4px;
  border-radius:999px;
  background: linear-gradient(110deg, transparent 20%, rgba(255,255,255,0.7) 45%, rgba(255,255,200,0.5) 55%, transparent 80%);
  background-size:250% 100%;
  opacity:0;
  pointer-events:none;
  z-index:0;
}
.app.enter .seg-control::before,
.app.shimmer .seg-control::before {
  animation: shimmer 4s ease-in-out forwards;
}
@keyframes shimmer {
  0%   { opacity:0; background-position:250% 0; }
  8%   { opacity:1; }
  30%  { opacity:1; }
  80%  { opacity:0.6; }
  100% { opacity:0; background-position:-250% 0; }
}
.seg-pill {
  position:absolute; top:0; height:100%;
  border-radius:999px;
  transition:left 200ms ease-in, width 200ms ease-in;
  pointer-events:none;
}
.seg-pill.red   { background:#CA2626; }
.seg-pill.beige { background:#e3c9a4; }

.seg-label {
  flex:1; text-align:center; z-index:1;
  position:relative; font-size:14px; line-height:1;
  white-space:nowrap; -webkit-tap-highlight-color:transparent;
}

/* Method (做法): 干/湿 */
#methodSeg { left:21px; top:105px; width:70px; height:35px; background:#e67f65; border:1px solid #e3c9a4; }
#methodSeg .seg-label { font-family:'Songti TC','STSong',serif; font-weight:700; font-size:16px; }

/* Type (种类): 细面/细粉/刀削面/桂林米粉 — absolute positioning from Figma */
#typeSeg { left:183px; top:105px; width:213px; height:35px; background:#e67f65; border:1px solid #e3c9a4; display:block; }
#typeSeg .seg-label { font-family:'Songti TC','STSong',serif; font-weight:400; position:absolute; top:50%; transform:translateY(-50%); flex:none; width:auto; }

/* Portion (份量): 中份/大份/巨大 */
#portionSeg { left:24px; top:535px; width:158px; height:39px; background:#e3c9a4; border:1px solid #CA2626; }
#portionSeg .seg-pill { transition:left 200ms linear; }
#portionSeg .seg-label { font-family:'PingFang SC','Hiragino Sans GB',sans-serif; }

/* Spice (辣度): 不辣/微辣/爆辣 */
#spiceSeg { left:231px; top:535px; width:160px; height:39px; background:#e3c9a4; border:1px solid #CA2626; }
#spiceSeg .seg-pill { transition:left 200ms linear; }
#spiceSeg .seg-label { font-family:'PingFang SC','Hiragino Sans GB',sans-serif; }

.random-btn {
  position:absolute; left:350px; top:468px;
  width:35px; height:37px; z-index:5;
  cursor:pointer;
}
.random-btn img { width:100%; height:100%; transition:transform 0.6s cubic-bezier(0.4,0,0.2,1); }
.random-btn .random-label {
  position:absolute; top:100%; left:50%; transform:translateX(-50%);
  font-family:'PingFang SC',sans-serif; font-size:10px; font-weight:400;
  color:#CA2626; white-space:nowrap; margin-top:2px;
}

/* ===== Bowl Display — Figma: image 153 at (107,242) 192×192 ===== */
.bowl-area {
  position:absolute; left:107px; top:242px;
  width:192px; height:192px;
  z-index:3; pointer-events:none;
}
.bowl-area img {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  object-fit:contain;
}
/* Layers: broth → noodles → 酸辣粉 → other toppings → condiments */
.bowl-broth   { z-index:0; }
.bowl-noodles { z-index:1; }
.bowl-suanlafen, .bowl-toppings, .bowl-condiments {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
}
.bowl-suanlafen  { z-index:2; }
.bowl-toppings   { z-index:3; }
.bowl-condiments { z-index:4; }
.bowl-toppings img, .bowl-suanlafen img {
  position:absolute;
  width:120px; height:120px;
  object-fit:contain;
}
.bowl-toppings img.spin-in {
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn {
  0%   { transform: scale(0); }
  60%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}
.bowl-condiments img {
  position:absolute; top:0; left:0;
  width:100px; height:100px;
  object-fit:contain;
}

/* ===== 浇头 - Figma-absolute positions ===== */
.jiaotou-title {
  position:absolute; left:28px; top:149px;
  font-family:'Songti TC','STSong',serif;
  font-size:24px; font-weight:700; color:#fff;
  z-index:8;
  text-shadow:0 1px 4px rgba(0,0,0,0.5);
}

.jiaotou-layer {
  position:absolute; left:0; top:0;
  width:402px; height:874px;
  z-index:8; pointer-events:none;
}
.jiaotou-item {
  position:absolute;
  width:84px; height:75px;
  cursor:pointer; transition:opacity 0.3s cubic-bezier(0,0,0.58,1);
  pointer-events:auto;
}
.jiaotou-item.dissolve { opacity:0; }
.jiaotou-item img {
  width:100%; height:100%;
  object-fit:contain;
  transition:opacity 0.15s ease;
}


/* ===== 小料台 ===== */
.condiment-scroll {
  position:absolute; left:7px; top:592px;
  width:395px; height:151px;
  z-index:8;
  overflow-x:auto; overflow-y:visible;
  white-space:nowrap;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.condiment-scroll::-webkit-scrollbar { display:none; }
.condiment-item {
  display:inline-block;
  cursor:pointer;
  vertical-align:bottom;
  margin-right:5px;
}
.condiment-item:active { transform:scale(0.9); }

.condiment-item img { display:block; width:auto; }

/* ===== Bottom Buttons ===== */
.btn-enter-menu {
  position:absolute; left:22px; top:749px;
  width:174px; height:52px;
  cursor:pointer; z-index:5;
}
.btn-enter-menu img { width:100%; height:100%; object-fit:contain; }
.btn-enter-menu:active { opacity:0.8; }

.btn-cart {
  position:absolute; right:19px; top:749px;
  width:170px; height:52px;
  cursor:pointer; z-index:5;
}
.btn-cart img { width:100%; height:100%; object-fit:contain; }
.btn-cart:active { opacity:0.8; }

/* ===== Bottom Bar & Nav ===== */
.bottom-bar {
  position:absolute; left:-9px; top:813px;
  width:442px; height:61px;
  background:#fff;
  box-shadow:0 -3px 4px rgba(180,37,37,0.26);
  z-index:16;
}
.bottom-bar.raised { z-index:102; }
.nav-bar-bg {
  position:absolute; left:-9px; top:813px;
  width:442px; height:61px;
  background:#fff;
  box-shadow:0 -3px 4px rgba(180,37,37,0.26);
  z-index:101; display:none;
}
.nav-bar-bg.show { display:block; }
.nav-bar {
  position:absolute; left:41px; top:822px;
  width:326px; height:49px;
  z-index:102;
}
.nav-item {
  position:absolute;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.nav-item img { max-width:100%; max-height:100%; object-fit:contain; }
.nav-item:active { opacity:0.7; }

/* ===== Loading Overlay ===== */
@keyframes loadingIn { from { opacity:0; } to { opacity:1; } }
.loading-overlay {
  position:absolute; left:0; top:0;
  width:402px; height:874px;
  z-index:350; display:none;
  background:#FFFCF8;
  flex-direction:column; align-items:center; justify-content:center;
  transition:opacity 0.4s ease-out;
}
.loading-overlay.show { display:flex; animation:loadingIn 0.6s ease; }
.loading-gif {
  width:200px; height:200px;
  object-fit:contain;
  -webkit-transform:translateZ(0);
  transform:translateZ(0);
  backface-visibility:hidden;
  image-rendering:auto;
}
.loading-overlay.fade-out { opacity:0; }
.loading-text {
  margin-top:16px;
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:15px; color:#000; font-weight:500;
}

/* ===== Placeholder Pages (orders, me) ===== */
#page-order, #page-me {
  position:absolute; left:0; top:0;
  width:402px; height:874px;
  background:#F5F5F5;
  display:none; flex-direction:column;
  z-index:10; overflow-y:auto;
  opacity:0; transition: opacity 0.3s ease;
  -webkit-overflow-scrolling:touch;
}
#page-order::-webkit-scrollbar, #page-me::-webkit-scrollbar { display:none; }
#page-me { padding-bottom:80px; }

/* Profile header */
.me-profile {
  display:flex; align-items:center; gap:12px;
  padding:24px 17px 0;
}
.me-avatar {
  width:80px; height:80px; border-radius:50%;
  overflow:hidden; flex-shrink:0;
}
.me-avatar img { width:100%; height:100%; object-fit:cover; }
.me-name {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:18px; font-weight:700; color:#000;
}
.me-phone {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:13px; font-weight:700; color:#000; margin-top:2px;
}

/* VIP Card */
.me-vip-card {
  margin:20px 15px 0; height:168px; border-radius:12px;
  overflow:hidden; position:relative;
}
.me-vip-card img { width:100%; height:100%; object-fit:cover; }

/* Stats bar */
.me-stats {
  margin:20px 15px 0; background:#fff; border-radius:12px;
  height:81px; display:flex; align-items:center;
}
.me-stat-item { flex:1; text-align:center; }
.me-stat-num {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:24px; font-weight:500; color:#000;
}
.me-stat-unit {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:12px; font-weight:500; color:#B4B4B4;
}
.me-stat-label {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:12px; font-weight:400; color:#000; margin-top:2px;
}
.me-stat-divider { width:1px; height:54px; background:#E5E5E5; }

/* Favorites section */
.me-fav {
  margin:20px 15px 0; background:#fff; border-radius:12px;
  padding:16px;
}
.me-fav-title {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:16px; font-weight:500; color:#000; margin-bottom:12px;
}
.me-fav-item { display:flex; align-items:center; gap:12px; }
.me-fav-item + .me-fav-item { margin-top:12px; padding-top:12px; border-top:1px solid #F5F5F5; }
.me-fav-thumb {
  width:76px; height:76px; border-radius:13px; background:#FAEDDD;
  overflow:hidden; flex-shrink:0;
}
.me-fav-thumb img { width:100%; height:100%; object-fit:contain; }
.me-fav-info { flex:1; min-width:0; }
.me-fav-name {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:16px; font-weight:500; color:#000;
}
.me-fav-spec {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:10px; font-weight:500; color:#B4B4B4; margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.me-fav-rebuy {
  width:83px; height:30px; border-radius:15px; background:#CA2525;
  border:none; cursor:pointer;
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:12px; font-weight:500; color:#fff; flex-shrink:0;
}
.me-fav-rebuy:active { opacity:0.85; }

/* Menu list */
.me-menu { margin:12px 15px 20px; background:#fff; border-radius:12px; padding:0 12px; }
.me-menu-row {
  display:flex; align-items:center; height:54px; cursor:pointer;
}
.me-menu-row:active { opacity:0.6; }
.me-menu-row + .me-menu-row { border-top:1px solid #F5F5F5; }
.me-menu-arrow {
  width:16px; height:16px; margin-left:4px; flex-shrink:0;
}
.me-menu-label {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:16px; font-weight:500; color:#000; flex:1;
}
.me-menu-sub {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:12px; font-weight:500; color:#B4B4B4;
}

#page-me .ph-title, #page-me .ph-sub { display:none; }
.order-top-bar {
  width:402px; height:94px;
  position:sticky; top:0; z-index:5;
  background:#fff;
  display:flex; align-items:flex-end; justify-content:center;
  padding-bottom:12px;
}
.order-top-title {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:20px; font-weight:500; color:#CA2626;
}
/* Order Card */
.order-list { padding:23px 21px 100px; display:flex; flex-direction:column; gap:12px; }
.order-card {
  background:#fff; border-radius:12px; padding:17px 16px 16px;
  position:relative;
}
.order-card-header {
  display:flex; align-items:center; gap:8px; margin-bottom:4px;
}
.order-store-name {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:16px; font-weight:400; color:#000;
}
.order-dine-tag {
  height:22px; padding:0 10px; border-radius:23px; background:#CA2525;
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:12px; font-weight:400; color:#fff;
  display:flex; align-items:center;
}
.order-status {
  position:absolute; right:16px; top:17px;
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:12px; color:#B4B4B4;
}
.order-date {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:12px; color:#B4B4B4; margin-bottom:8px;
}
.order-number-badge {
  position:absolute; right:16px; top:40px;
  height:18px; padding:0 6px; border-radius:2px;
  background:#FACC15;
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:8px; color:#000;
  display:flex; align-items:center;
}

/* Order item thumbnails */
.order-items-row {
  display:flex; gap:9px; margin-bottom:8px; flex-wrap:wrap;
}
.order-item-thumb {
  width:67px; height:67px; border-radius:13px; overflow:hidden;
  background:#FAEDDD; flex-shrink:0;
}
.order-item-thumb img {
  width:100%; height:100%; object-fit:contain;
}

/* Order card footer */
.order-card-footer {
  display:flex; align-items:center; justify-content:flex-end;
}
.order-total {
  position:absolute; right:16px; top:87px;
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:16px; font-weight:400; color:#000;
}
.order-rebuy-btn {
  width:83px; height:30px; border-radius:15px; background:#CA2525;
  border:none; cursor:pointer;
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:12px; font-weight:400; color:#fff;
}
.order-rebuy-btn:active { opacity:0.85; }

.order-load-more {
  text-align:center; padding:0 0 20px;
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:10px; color:#B4B4B4;
}

.order-empty {
  text-align:center; padding:200px 0;
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
.order-empty-row {
  display:flex; align-items:center; justify-content:center;
  margin-bottom:40px;
}
.order-empty-line {
  width:40px; height:1px; background:#B4B4B4;
  flex-shrink:0;
}
.order-empty-text {
  font-size:16px; color:#B4B4B4; margin:0 12px;
}
.order-pig-stamp {
  width:100px; height:131px; display:block; margin:0 auto;
  opacity:0.4;
}

#page-order .ph-title, #page-me .ph-title {
  font-family:'Songti TC','STSong',serif;
  font-size:36px; color:#FBE7CA;
  margin-bottom:16px;
}
#page-order .ph-sub, #page-me .ph-sub {
  font-family:'PingFang SC',sans-serif;
  font-size:16px; color:rgba(255,255,255,0.4);
}

/* ===== Menu Page ===== */
#page-menu {
  position:absolute; left:0; top:0;
  width:402px; height:874px;
  background:#fff;
  z-index:10; overflow:hidden;
  display:none;
  opacity:0; transition: opacity 0.3s ease;
}
@keyframes pageFadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}
.app.on-menu .bg-photo,
.app.on-menu .price-tag,
.app.on-menu .seg-control,
.app.on-menu .jiaotou-title,
.app.on-menu .jiaotou-layer,
.app.on-menu .bowl-area,
.app.on-menu .random-btn,
.app.on-menu .condiment-scroll,
.app.on-menu .btn-enter-menu,
.app.on-menu .btn-cart,
.app.on-menu .sec-label { display:none !important; }

.menu-top-bar {
  position:absolute; top:0; left:0;
  width:402px; height:100px;
  z-index:15;
}
.menu-top-search {
  position:absolute; left:0; top:0;
  width:402px; height:101px;
}

.menu-dine-toggle {
  position:absolute; right:20px; top:15px;
  width:100px; height:36px; cursor:pointer;
  border-radius:35px;
  border:1px solid #fff; z-index:14;
  overflow:hidden;
  display:flex; align-items:center;
}
.dine-pill {
  position:absolute; width:54px; height:100%;
  background:#FFFCF8; border-radius:35px;
  transition:left 200ms ease;
}
.dine-pill.right { left:46px; }
.dine-text {
  flex:1; text-align:center;
  font-family:'PingFang SC',sans-serif;
  font-size:15px; line-height:36px;
  position:relative; z-index:1;
  transition:color 200ms;

  24%  { left:101px; top:237px; width:200px; height:200px; opacity:1; }
  40%  { left:-12px; top:143px; width:450px; height:450px; opacity:1; }
  55%  { left:-12px; top:143px; width:450px; height:450px; opacity:1; }
  100% { left:-12px; top:143px; width:450px; height:450px; opacity:0; }

const supportsWebP = (() => {
  const c = document.createElement('canvas');
  return c.toDataURL('image/webp').indexOf('data:image/webp') === 0;
})();
const wsrc = p => supportsWebP ? p.replace(/\.(png|jpg|jpeg)$/i, '.webp') : p;

// Patch HTMLImageElement.prototype.src so all img.src = "....webp" auto-use WebP
if (supportsWebP) {
  var _srcDesc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
  Object.defineProperty(HTMLImageElement.prototype, 'src', {
    get: _srcDesc.get,
    set: function(v) { _srcDesc.set.call(this, typeof v === 'string' ? wsrc(v) : v); }
  });
// Image src auto-conversion handled by prototype patch above

  document.documentElement.classList.add('webp');
}

// Background music — Web Audio API with loop points (trim first 1s, last 3s)
const bgm = {
  ctx: null, buffer: null, source: null, playing: false, _init: false,
  async init() {
    if (this._init) return;
    this._init = true;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const resp = await fetch('咕噜声.mp4');
    const data = await resp.arrayBuffer();
    this.buffer = await this.ctx.decodeAudioData(data);
  },
  async play() {
    if (!this.buffer || this.playing) return;
    await this.ctx.resume();
    const src = this.ctx.createBufferSource();
    src.buffer = this.buffer;
    src.loop = true;
    src.loopStart = 0;
    src.loopEnd = Math.min(20, this.buffer.duration);
    src.connect(this.ctx.destination);
    src.start(0, 0);
    this.source = src;
    this.playing = true;
  },
  stop() {
    if (!this.playing) return;
    try { this.source.stop(); } catch(e) {}
    this.source = null;
    this.playing = false;
  }
};

function selectMenuItem(id) {
  const idx = state.menuCart.findIndex(i => i.id === id);
  if (idx >= 0) {
    state.menuCart[idx].qty = (state.menuCart[idx].qty || 1) + 1;
  } else {
    const card = document.querySelector('.menu-card[data-id="'+id+'"]');
    if (card) {
      state.menuCart.push({
        id: id,
        name: card.dataset.name,
        price: parseFloat(card.dataset.price),
        qty: 1
      });
    }
  }
  const card = document.querySelector('.menu-card[data-id="'+id+'"]');
  if (card) {
    var isNowSelected = idx < 0;
    card.classList.toggle('selected', isNowSelected);
    // Swap image to selected/unselected state
    var img = card.querySelector('img');
    menuData.forEach(function(cat) {
      cat.items.forEach(function(item) {
        if (item.id === id) {
          if (isNowSelected && item.imgSel) {
            img.src = item.imgSel;
          } else if (!isNowSelected && item.img) {
            img.src = item.img;
          }
        }
      });
    });
  }
  updateMenuCart();
}

function menuCardInc(id) {
  const card = document.querySelector('.menu-card[data-id="'+id+'"]');
  if (!card) return;
  const idx = state.menuCart.findIndex(i => i.id === id);
  if (idx >= 0) {
    state.menuCart[idx].qty = (state.menuCart[idx].qty || 1) + 1;
  } else {
    state.menuCart.push({
      id: id,
      name: card.dataset.name,
      price: parseFloat(card.dataset.price),
      qty: 1
    });
  }
  refreshDrinkQtys();
  updateMenuCart();
}

function menuCardDec(id) {
  const idx = state.menuCart.findIndex(i => i.id === id);
  if (idx < 0) return;
  if (state.menuCart[idx].qty > 1) {
    state.menuCart[idx].qty--;
  } else {
    state.menuCart.splice(idx, 1);
  }
  refreshDrinkQtys();
  updateMenuCart();
}

function refreshDrinkQtys() {
  document.querySelectorAll('.menu-qty-ctrl .mqty-num').forEach(function(el) {
    var id = el.id.replace('mqty_', '');
    var item = state.menuCart.find(function(i) { return i.id === id; });
    el.textContent = item ? (item.qty || 1) : '0';
  });
}

function updateMenuCart() {
  refreshDrinkQtys();
  var total = state.menuCart.reduce((s,i) => s + i.price * (i.qty||1), 0);
  if (state.dineType === '外带') total += 1;
  const count = state.menuCart.reduce((s,i) => s + (i.qty||1), 0);

  // Bottom bar
  var bbIcon = document.getElementById('bbIcon');
  var bbBadge = document.getElementById('bbBadge');
  var bbPrice = document.getElementById('bbPrice');
  var bbBtn = document.getElementById('bbBtn');

  if (count > 0) {
    // Figma "选中后": icon + badge + price + enabled button
    if (bbIcon) { bbIcon.src = '价格浮窗/碗（选中后）.webp'; bbIcon.parentElement.classList.add('small'); }
    if (bbBadge) { bbBadge.textContent = count; bbBadge.classList.add('show'); }
    if (bbPrice) { bbPrice.innerHTML = '<span class="sym">¥</span><span class="num">'+Number(total).toFixed(1)+'</span>'; bbPrice.classList.add('has-items'); }
    if (bbBtn) bbBtn.classList.add('on');
  } else {
    // Figma "选中前": icon + "未选购商品" + disabled button
    if (bbIcon) { bbIcon.src = '价格浮窗/碗.webp'; bbIcon.parentElement.classList.remove('small'); }
    if (bbBadge) bbBadge.classList.remove('show');
    if (bbPrice) { bbPrice.textContent = '未选购商品'; bbPrice.classList.remove('has-items'); }
    if (bbBtn) bbBtn.classList.remove('on');
  }
  renderCartPanel();
}

function openCartPanel() {
  if (state.menuCart.length === 0) return;
  var overlay = document.getElementById('cartOverlay');
  var sheet = document.getElementById('cartSheet');
  // Show overlay + sheet first, then trigger transition
  if (overlay) { overlay.style.display = 'block'; }
  if (sheet) { sheet.style.display = 'flex'; }
  renderCartPanel();
  if (overlay) { overlay.offsetHeight; overlay.classList.add('open'); }
  if (sheet) { sheet.classList.add('open'); }
  var bottomBar = document.querySelector('.bottom-bar');
  if (bottomBar) bottomBar.classList.add('raised');
}

function toggleCartPanel() {
  var overlay = document.getElementById('cartOverlay');
  if (!overlay) return;
  if (overlay.classList.contains('open')) {
    closeCartPanel();
  } else {
    openCartPanel();
  }
}

function closeCartPanel() {
  var overlay = document.getElementById('cartOverlay');
  var sheet = document.getElementById('cartSheet');
  if (overlay) overlay.classList.remove('open');
  if (sheet) sheet.classList.remove('open');
  // Hide after transition completes
  setTimeout(function() {
    if (overlay && !overlay.classList.contains('open')) overlay.style.display = 'none';
    if (sheet && !sheet.classList.contains('open')) sheet.style.display = 'none';
  }, 350);
  var bottomBar = document.querySelector('.bottom-bar');
  if (bottomBar) bottomBar.classList.remove('raised');
}

function clearCart() {
  state.menuCart = [];
  refreshDrinkQtys();
  updateMenuCart();
  document.querySelectorAll('.menu-card.selected').forEach(function(c) {
    c.classList.remove('selected');
    var id = c.dataset.id;
    var img = c.querySelector('img');
    menuData.forEach(function(cat) {
      cat.items.forEach(function(item) {
        if (item.id === id && item.img) img.src = item.img;
      });
    });
  });
  closeCartPanel();
}

function cartChangeQty(idx, delta) {
  var removedId = null;
  if (delta < 0 && state.menuCart[idx].qty <= 1) {
    removedId = state.menuCart[idx].id;
    state.menuCart.splice(idx, 1);
  } else if (delta < 0) {
    state.menuCart[idx].qty--;
  } else {
    state.menuCart[idx].qty = (state.menuCart[idx].qty || 1) + 1;
  }
  if (removedId) {
    var card = document.querySelector('.menu-card[data-id="'+removedId+'"]');
    if (card) {
      card.classList.remove('selected');
      var img = card.querySelector('img');
      menuData.forEach(function(cat) {
        cat.items.forEach(function(item) {
          if (item.id === removedId && item.img) img.src = item.img;
        });
      });
    }
  }
  updateMenuCart();
}

function renderCartPanel() {
  var list = document.getElementById('cartSheetList');
  var title = document.getElementById('cartSheetTitle');
  if (!list || !title) return;
  var totalItems = state.menuCart.reduce(function(s,i){ return s + (i.qty||1); }, 0);
  var totalPrice = state.menuCart.reduce(function(s,i){ return s + i.price * (i.qty||1); }, 0);
  if (state.dineType === '外带') totalPrice += 1;
  title.textContent = '已选'+totalItems+'件商品';

  // Update bottom elements inside cart sheet
  var icon = document.getElementById('csIcon');
  var badge = document.getElementById('csBadge');
  var price = document.getElementById('csPrice');
  var btn = document.getElementById('csBtn');
  if (state.menuCart.length > 0) {
    if (icon) icon.src = '价格浮窗/碗（选中后）.webp';
    if (badge) { badge.textContent = totalItems; badge.classList.add('show'); }
    if (price) price.innerHTML = '<span class="sym">¥</span><span class="num">'+Number(totalPrice).toFixed(1)+'</span>';
    if (btn) btn.classList.add('on');
  } else {
    if (icon) icon.src = '价格浮窗/碗.webp';
    if (badge) badge.classList.remove('show');
    if (price) price.textContent = '未选购商品';
    if (btn) btn.classList.remove('on');
  }

  if (state.menuCart.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px 0;color:#808080;font-size:14px;">购物车是空的</div>';
    return;
  }
  var html = '';
  state.menuCart.forEach(function(item, idx) {
    var qty = item.qty || 1;
    var specHTML = item.spec ? '<div class="cart-item-spec">'+item.spec+'</div>' : '';
    html += '<div class="cart-item">'+
      '<div class="cart-item-img"><img src="'+getCartImg(item.name)+'" alt="" onerror="this.src=\'购物车菜品/清空.webp\'"></div>'+
      '<div class="cart-item-info">'+

        specHTML+
        '<div class="cart-item-price">¥'+Number(item.price).toFixed(1)+'</div>'+

        '<img src="详情页/底部按钮/减少.webp" alt="-" onclick="event.stopPropagation();cartChangeQty('+idx+',-1)">'+
        '<span>'+qty+'</span>'+
        '<img src="详情页/底部按钮/添加.webp" alt="+" onclick="event.stopPropagation();cartChangeQty('+idx+',1)">'+
      '</div>'+
    '</div>';
  });
  list.innerHTML = html;
}

  if (state.menuCart.length === 0) {

function renderComboDetail(id) {
  const c = comboData[id];
  if (!c) return;
  _comboExtras = 0;
  _comboItemSpecs = {};
  document.getElementById('detailImg').src = c.hero;
  document.getElementById('detailName').textContent = c.name;
  document.getElementById('detailDesc').textContent = c.desc;
  document.getElementById('detailComboBody').style.display = 'block';

  var sectionsEl = document.getElementById('detailComboSections');
  // Fade-out → rebuild → fade-in to avoid innerHTML flash
  sectionsEl.style.opacity = '0';
  requestAnimationFrame(function() {
    var html = '';
    c.sections.forEach(function(sec, si) {
      html += '<div class="detail-section-heading">'+sec.heading+'</div>';
      var sizeClass = sec.heading==='主食' ? 'card-main' : 'card-side';
      sec.items.forEach(function(item, ii) {
        var cls = 'combo-card '+sizeClass;
        var onclick = '';
        if (item.modifiable) {
          cls += ' modifiable';
          onclick = ' onclick="event.stopPropagation();showMethodPopup(\x27'+id+'\x27,'+si+','+ii+')"';
          html += '<div class="'+cls+'" data-si="'+si+'" data-ii="'+ii+'"'+onclick+'><img src="'+item.img+'" alt="'+item.name+'"></div>';
          return;
        } else if (sec.pickOne) {
          var sel = ii===0;
          cls += ' pick-one' + (sel ? ' selected' : '');
          var src = (sel && item.imgSel) ? item.imgSel : item.img;
          onclick = ' onclick="event.stopPropagation();pickOneToggle(this,\x27'+id+'\x27,'+si+')"';
          html += '<div class="'+cls+'" data-si="'+si+'" data-ii="'+ii+'"'+onclick+'><img src="'+src+'" alt="'+item.name+'"></div>';
          return;
        }
        cls += ' toggleable';
        onclick = ' onclick="event.stopPropagation();toggleCardSelect(this,\x27'+id+'\x27,'+si+','+ii+')"';
        html += '<div class="'+cls+'" data-si="'+si+'" data-ii="'+ii+'"'+onclick+'><img src="'+item.img+'" alt="'+item.name+'"></div>';
      });
    });
    sectionsEl.innerHTML = html;
    sectionsEl.style.opacity = '1';
  });
}

function pickOneToggle(el, comboId, sectionIdx) {
  var container = document.getElementById('detailComboSections');
  var cards = container.querySelectorAll('.combo-card.pick-one[data-si="'+sectionIdx+'"]');
  // Reset all cards in this pick-one group: switch back to unselected img
  cards.forEach(function(c) {
    c.classList.remove('selected');
    var ii = parseInt(c.dataset.ii);
    var item = comboData[comboId].sections[sectionIdx].items[ii];
    if (item) { c.querySelector('img').src = item.img; }
  });
  // Set the clicked card as selected: switch to selected img
  el.classList.add('selected');
  var elIi = parseInt(el.dataset.ii);
  var elItem = comboData[comboId].sections[sectionIdx].items[elIi];
  if (elItem && elItem.imgSel) {
    el.querySelector('img').src = elItem.imgSel;
  }
  // Bounce
  el.classList.add('bounce');
  setTimeout(function() { el.classList.remove('bounce'); }, 400);
}

function toggleCardSelect(el, comboId, si, ii) {
  var item = comboData[comboId].sections[si].items[ii];
  if (!item) return;
  var isSel = el.classList.toggle('selected');
  if (isSel && item.imgSel) {
    el.querySelector('img').src = item.imgSel;
  } else {
    el.querySelector('img').src = item.img;
  }
  el.classList.add('bounce');
  setTimeout(function() { el.classList.remove('bounce'); }, 400);
}

function showMethodPopup(comboId, si, ii) {
  var titleText = '选择规格', descText = '';
  var item = null;
  if (comboId && comboData[comboId]) {
    var c = comboData[comboId];
    var sec = c.sections[si];
    if (sec && sec.items[ii]) {
      item = sec.items[ii];
      titleText = item.name;
    }
    descText = c.desc || '';
  }
  // Store which card is being modified for the confirm callback
  _specComboId = comboId;
  _specSi = si;
  _specIi = ii;
  showSpecPopup(titleText, descText, function() {
    if (!_specComboId || _specSi === undefined) return;
    // Save spec selections for this combo item
    if (!_comboItemSpecs[_specComboId]) _comboItemSpecs[_specComboId] = {};
    var key = _specSi + '_' + _specIi;
    _comboItemSpecs[_specComboId][key] = JSON.parse(JSON.stringify(_specSelections));
    recalcComboExtras();
    updateDetailPrice();
    // Find the card element and update it
    var sections = document.getElementById('detailComboSections');
    var cards = sections.querySelectorAll('.combo-card.modifiable');
    cards.forEach(function(card) {
      if (card.dataset.si == _specSi && card.dataset.ii == _specIi) {
        var c = comboData[_specComboId];
        var it = c.sections[_specSi].items[_specIi];
        if (it.imgSel) {
          card.querySelector('img').src = it.imgSel;
        }
        card.classList.add('bounce');
        setTimeout(function() { card.classList.remove('bounce'); }, 400);
      }
    });
  });
}

function showMethodPopupForItem(card, name, price) {

  _specBasePrice = price;

    state.menuCart.push({ id: card.dataset.id, name: name, price: total, qty: 1, spec: buildSpecLine() });

function showSpecPopup(titleText, descText, onConfirm, excludeCats) {
  var existing = document.getElementById('methodPopupOverlay');
  if (existing) existing.remove();
  _specSelections = {};
  _specConfirmCb = onConfirm || null;
  excludeCats = excludeCats || [];

  // Build scroll content HTML first
  var scrollHTML = '<div class="spec-title">'+titleText+'</div>';
  if (descText) scrollHTML += '<div class="spec-desc">'+descText+'</div>';

  Object.keys(specData).forEach(function(cat) {
    if (excludeCats.indexOf(cat) >= 0) return;
    var sd = specData[cat];
    scrollHTML += '<div class="spec-heading">'+cat+(sd.type==='multi'?'(可选多种)':'(任选一种)')+'</div>';
    scrollHTML += '<div class="spec-pills" data-cat="'+cat+'">';
    sd.options.forEach(function(opt, oi) {
      var n = typeof opt === 'string' ? opt : opt.name;
      var pr = (typeof opt === 'object' && opt.price) ? opt.price : 0;
      var onClass = oi===0 && sd.type==='single' ? ' on' : '';
      var priceHTML = pr ? '<span class="spec-price">¥'+pr+'</span>' : '';
      var pillCls = pr ? 'spec-pill has-price'+onClass : 'spec-pill'+onClass;
      scrollHTML += '<span class="'+pillCls+'" data-cat="'+cat+'" data-idx="'+oi+'" data-name="'+n+'" data-price="'+pr+'" onclick="event.stopPropagation();specTogglePill(this)">'+n+priceHTML+'</span>';
    });
    scrollHTML += '</div>';

    if (sd.type === 'single') {
      _specSelections[cat] = 0;
    } else {
      _specSelections[cat] = [];
    }
  });

  var overlay = document.createElement('div');
  overlay.id = 'methodPopupOverlay';
  overlay.className = 'spec-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) closeMethodPopup(); };

  var modal = document.createElement('div');
  modal.className = 'spec-modal';

  var closeBar = document.createElement('div');
  closeBar.className = 'spec-close-bar';
  closeBar.innerHTML = '<span></span>';
  modal.appendChild(closeBar);

  var scroll = document.createElement('div');
  scroll.className = 'spec-scroll';
  scroll.innerHTML = scrollHTML;
  modal.appendChild(scroll);

  var wrap = document.createElement('div');
  wrap.className = 'spec-confirm-wrap';
  wrap.innerHTML = '<div class="spec-total-price"><span class="sym">¥</span><span id="specTotalPrice">'+_specBasePrice+'</span></div>'+
    '<button class="spec-confirm-btn" onclick="confirmSpecPopup()">我选好了</button>';
  modal.appendChild(wrap);

  overlay.appendChild(modal);
  document.querySelector('.app').appendChild(overlay);
  overlay.offsetHeight; // force reflow
  overlay.classList.add('show');
  modal.classList.add('show');
  document.getElementById('navBar').style.display = 'none';
}

function confirmSpecPopup() {
  if (_specConfirmCb) _specConfirmCb();
  var card = _specBounceCard;

    // Swap to selected image
    var id = card.dataset.id;

          card.querySelector('img').src = item.imgSel;
        }

    setTimeout(function() { card.classList.remove('bounce'); }, 400);

var _specConfirmCb = null;
var _specComboId = null;
var _specSi = -1;
var _specIi = -1;
var _specBasePrice = 0;
var _comboExtras = 0;
var _comboItemSpecs = {};

function recalcComboExtras() {
  var extras = 0;
  var specs = _comboItemSpecs[_detailId] || {};
  Object.keys(specs).forEach(function(key) {
    var sel = specs[key];
    // 分量 extra
    var portionSel = sel['分量'];
    if (portionSel !== undefined && portionSel > 0) {
      var portionOpt = specData['分量'].options[portionSel];
      if (typeof portionOpt === 'object' && portionOpt.price) extras += portionOpt.price;
    }
    // 加料 extras
    var addonSel = sel['加料'] || [];
    addonSel.forEach(function(idx) {
      var opt = specData['加料'].options[idx];
      if (opt && opt.price) extras += opt.price;
    });
  });
  _comboExtras = extras;
}

function calcSpecTotal(basePrice) {
  var total = basePrice;
  // 分量 extra
  var portionSel = _specSelections['分量'];
  if (portionSel !== undefined) {
    var portionOpt = specData['分量'].options[portionSel];
    if (typeof portionOpt === 'object' && portionOpt.price) total += portionOpt.price;
  }
  // 加料 extras
  var addonSel = _specSelections['加料'] || [];
  addonSel.forEach(function(idx) {
    var opt = specData['加料'].options[idx];
    if (opt && opt.price) total += opt.price;
  });
  return total;
}

function buildSpecLine() {
  var parts = [];
  var methodSel = _specSelections['做法'];
  if (methodSel !== undefined) parts.push(specData['做法'].options[methodSel]);
  var noodleSel = _specSelections['面条'];
  if (noodleSel !== undefined) parts.push(specData['面条'].options[noodleSel]);
  var portionSel = _specSelections['分量'];
  if (portionSel !== undefined) {
    var po = specData['分量'].options[portionSel];
    parts.push(typeof po === 'object' ? po.name : po);
  }
  var spiceSel = _specSelections['辣度'];
  if (spiceSel !== undefined) parts.push(specData['辣度'].options[spiceSel]);
  var tabooSel = _specSelections['忌口'];
  if (tabooSel !== undefined && tabooSel > 0) parts.push(specData['忌口'].options[tabooSel]);
  return parts.join(' · ');
}

function updateSpecPrice() {
  var el = document.getElementById('specTotalPrice');
  if (el) el.textContent = calcSpecTotal(_specBasePrice);
}

function specTogglePill(el) {
  var cat = el.dataset.cat;
  var idx = parseInt(el.dataset.idx);
  var sd = specData[cat];
  if (sd.type === 'single') {
    var pills = el.parentElement.querySelectorAll('.spec-pill');
    pills.forEach(function(p) { p.classList.remove('on'); });
    el.classList.add('on');
    _specSelections[cat] = idx;
  } else {
    el.classList.toggle('on');
    var sel = _specSelections[cat];
    var pos = sel.indexOf(idx);
    if (pos >= 0) sel.splice(pos, 1);
    else sel.push(idx);
  }
  updateSpecPrice();
}

function closeMethodPopup() {
  var el = document.getElementById('methodPopupOverlay');
  if (!el) { _specBounceCard = null; return; }
  el.classList.remove('show');
  var modal = el.querySelector('.spec-modal');
  if (modal) modal.classList.remove('show');
  setTimeout(function() { if (el) el.remove(); }, 350);
  _specBounceCard = null;
  var detailPage = document.getElementById('page-detail');
  if (!detailPage || !detailPage.classList.contains('show')) {
    document.getElementById('navBar').style.display = '';
  }
}

function updateDetailPrice() {
  var price = 0;
  if (_detailId && _detailId.startsWith('combo') && comboData[_detailId]) {
    price = comboData[_detailId].price + (_comboExtras || 0);
  } else {
    var card = document.querySelector('.menu-card[data-id="'+_detailId+'"]');
    price = parseFloat(card?.dataset.price || 0);
  }
  price = Math.round(price * _detailQty * 10) / 10;
  document.getElementById('detailPrice').textContent = '¥'+Number(price).toFixed(1);
}

function detailChangeQty(delta) {
  _detailQty = Math.max(1, _detailQty + delta);
  document.getElementById('detailQty').textContent = _detailQty;
  updateDetailPrice();
}

function detailAddToCart() {
  if (!_detailId) return;
  var cartPrice, cartName;
  var specParts = [];
  if (_detailId.startsWith('combo') && comboData[_detailId]) {
    var c = comboData[_detailId];
    cartPrice = c.price + (_comboExtras || 0);
    cartName = c.name;
    // Build spec summary from modified items
    var comboSpecs = _comboItemSpecs[_detailId] || {};
    Object.keys(comboSpecs).forEach(function(key) {
      var sel = comboSpecs[key];
      var parts = [];
      if (sel['做法'] !== undefined && sel['做法'] > 0) parts.push(specData['做法'].options[sel['做法']]);
      if (sel['分量'] !== undefined && sel['分量'] > 0) parts.push(specData['分量'].options[sel['分量']].name);
      var addons = (sel['加料'] || []).map(function(i) { return specData['加料'].options[i].name; });
      if (addons.length) parts.push('加'+addons.join('、'));
      if (parts.length) specParts.push(parts.join(' '));
    });
  } else {

function entranceAnimation() {
  const layer = document.getElementById('jiaotouLayer');
  const items = [...layer.children];
  const origin = toppingDefs.find(t => t.name === '牛肉');
  const ox = origin.x, oy = origin.y;

  // Compute circle center (centroid of all toppings)
  let cx = 0, cy = 0;
  toppingDefs.forEach(t => { cx += t.x; cy += t.y; });
  cx /= toppingDefs.length; cy /= toppingDefs.length;

  // Map: topping name → {angle, radius} from center
  const polarMap = {};
  toppingDefs.forEach(t => {
    polarMap[t.name] = {
      angle: Math.atan2(t.y - cy, t.x - cx),
      r: Math.hypot(t.x - cx, t.y - cy)
    };
  });
  const originAngle = polarMap['牛肉'].angle;

  // Sort counter-clockwise from 牛肉 on the circle
  items.sort((a, b) => {
    const na = a.querySelector('img').alt;
    const nb = b.querySelector('img').alt;
    let aa = polarMap[na].angle, ab = polarMap[nb].angle;
    if (aa < originAngle) aa += Math.PI * 2;
    if (ab < originAngle) ab += Math.PI * 2;
    return aa - ab;
  });

  // Move all to origin position, hidden
  items.forEach(el => {
    el.style.left = ox + 'px';
    el.style.top = oy + 'px';
    el.style.opacity = '0';
  });

  // Animate along arc using transform (GPU) from each item's own starting = 牛肉 pos
  items.forEach((el) => {
    const def = toppingDefs.find(t => t.name === el.querySelector('img').alt);
    if (!def) return;
    const targetPolar = polarMap[def.name];
    const targetAngle = targetPolar.angle;
    const targetR = targetPolar.r;
    const dAngleRaw = targetAngle - originAngle;
    const dAngle = dAngleRaw < 0 ? dAngleRaw + Math.PI * 2 : dAngleRaw;
    const speed = 0.002; // radians per ms
    const duration = dAngle / speed;

    el.style.opacity = '1';
    const startTime = performance.now();

    function step(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      const curAngle = originAngle + dAngle * t;
      const curX = cx + targetR * Math.cos(curAngle);
      const curY = cy + targetR * Math.sin(curAngle);
      el.style.transform = 'translate(' + (curX - ox) + 'px,' + (curY - oy) + 'px)';
      if (t < 1) {
        requestAnimationFrame(step);
      } else {
        el.style.left = curX + 'px';
        el.style.top = curY + 'px';
        el.style.transform = '';
      }
    }

    requestAnimationFrame(step);
  });
}

function condimentEntrance() {
  const scroll = document.getElementById('condimentScroll');
  const items = [...scroll.children];
  if (!items.length) return;

  const wandouIdx = condDefs.findIndex(c => c.name === '豌豆');
  const wandouEl = items[wandouIdx];
  const scrollRect = scroll.getBoundingClientRect();
  const originX = wandouEl.getBoundingClientRect().left - scrollRect.left;

  // Store each item's target x
  const targets = items.map(el => ({
    el,
    targetX: el.getBoundingClientRect().left - scrollRect.left,
  }));

  // Move all to 豌豆 position, hide with opacity 0
  items.forEach(el => {
    el.style.transition = 'none';
    el.style.opacity = '0';
    el.style.transform = 'translateX(' + (originX - targets.find(t => t.el === el).targetX) + 'px)';
  });

  // Same total duration as topping arc (酸辣粉)
  const totalDuration = 3000;
  const maxDist = Math.max(...targets.map(t => Math.abs(t.targetX - originX)));
  const startTime = performance.now();

  targets.forEach(tgt => {
    const el = tgt.el;
    const dist = originX - tgt.targetX;
    const dur = maxDist > 0 ? (Math.abs(dist) / maxDist) * totalDuration : 0;

    function step(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / dur, 1);
      const offset = originX + (tgt.targetX - originX) * t;
      el.style.transform = 'translateX(' + (offset - tgt.targetX) + 'px)';
      el.style.opacity = t;
      if (t < 1) {
        requestAnimationFrame(step);
      } else {
        el.style.transform = '';
        el.style.opacity = '';
        el.style.transition = '';
      }
    }

    if (dur > 0) {
      requestAnimationFrame(step);
    } else {
      el.style.transform = '';
      el.style.opacity = '';
    }
  });
}

function randomize(e) {
  const img = document.getElementById('randomImg');
  if (img.dataset.animating === '1') return;
  img.dataset.animating = '1';
  img.style.transform = 'rotate(360deg)';
  img.addEventListener('transitionend', function h() {
    img.removeEventListener('transitionend', h);
    img.style.transition = 'none';
    img.style.transform = 'rotate(0deg)';
    void img.offsetWidth;
    img.style.transition = '';
    img.dataset.animating = '';
  });

  const spices = ['不辣','微辣','爆辣'];
  const portions = ['中份','大份','巨大'];
  const types = ['细面','细粉','刀削面','桂林米粉'];
  const methods = ['干','湿'];

  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  // Randomize everything
  const spice = pick(spices);
  const portion = pick(portions);
  const type = pick(types);
  const method = pick(methods);
  const topping = pick(toppingDefs);

  // Apply all
  state.spice = spice;
  state.portion = portion;
  state.noodleType = type;
  state.method = method;
  var prevToppings = state.toppings.slice();
  state.toppings = [topping.name];
  state.toppingSlots = { [topping.name]: Math.floor(Math.random() * 10) };
  state._prevBowlToppings = prevToppings;

  syncSegments();
  updateBowl();
  updateBowlOverlays();
  updateNoodleSize();
  updatePrice();

  // Incrementally update topping UI instead of full rebuild
  var layer = document.getElementById('jiaotouLayer');
  var items = layer.querySelectorAll('.jiaotou-item img');
  items.forEach(function(img) {
    var def = toppingDefs.find(function(t) { return t.name === img.alt; });
    if (!def) return;
    var selected = state.toppings.indexOf(img.alt) >= 0;
    img.src = selected ? def.s : def.u;
  });
}

function toggleTopping(name, el) {
  const idx = state.toppings.indexOf(name);
  const def = toppingDefs.find(t => t.name === name);
  const img = el.querySelector('img');
  const adding = idx === -1;
  const newSrc = adding ? def.s : def.u;

  // Simple opacity crossfade — no DOM creation, no forced reflow
  img.style.opacity = '0';
  requestAnimationFrame(function() {
    if (idx > -1) {
      state.toppings.splice(idx, 1);
      delete state.toppingSlots[name];
      if (name === '酸辣粉') {
        const pIdx = state.condiments.indexOf('花生');
        if (pIdx > -1) state.condiments.splice(pIdx, 1);
        renderCondiments();
      }
    } else {
      state.toppings.push(name);
      if (name !== '酸辣粉') {
        const used = new Set(Object.values(state.toppingSlots));
        const free = bowlSlots.map(function(_, i) { return i; }).filter(function(i) { return !used.has(i); });
        if (free.length) {
          state.toppingSlots[name] = free[Math.floor(Math.random() * free.length)];
        }
      }
      if (name === '酸辣粉') {
        if (!state.condiments.includes('花生')) {
          state.condiments.push('花生');
          renderCondiments();
        }
        if (state.method !== '干') {
          state.method = '干';
          syncSegments();
        }
      }
    }
    img.src = newSrc;
    img.style.opacity = '1';
    updateBowlOverlays();
    updatePrice();
  });
}



function syncSegments() {
  // Method (做法) — red bg #e67f65, beige pill, dark sel / white unsel
  document.querySelectorAll('#methodSeg .seg-label').forEach(l => {

      pill.style.width = l.offsetWidth + 'px';
    }
  });

  // Type (种类) — absolute labels, hardcoded Figma pill positions
  const typePillPos = {'细面':[0,36], '细粉':[43,36], '刀削面':[80,67], '桂林米粉':[136,77]};
  const [tl, tw] = typePillPos[state.noodleType];
  document.getElementById('typePill').style.left = tl + 'px';
  document.getElementById('typePill').style.width = tw + 'px';
  document.querySelectorAll('#typeSeg .seg-label').forEach(l => {
    l.style.color = l.textContent === state.noodleType ? '#9e5d00' : '#fff';
  });

  // Portion (份量) — beige bg #e3c9a4, red pill, beige sel / dark unsel
  document.querySelectorAll('#portionSeg .seg-label').forEach(l => {
    const sel = l.textContent === state.portion;
    l.style.color = sel ? '#e3c9a4' : '#9e5d00';
    l.style.fontWeight = sel ? '600' : '500';
    if (sel) {
      const pill = document.getElementById('portionPill');
      pill.style.left = l.offsetLeft + 'px';
      pill.style.width = l.offsetWidth + 'px';
    }
  });

  // Spice (辣度) — beige bg #e3c9a4, red pill, beige sel / dark unsel
  document.querySelectorAll('#spiceSeg .seg-label').forEach(l => {
    const sel = l.textContent === state.spice;
    l.style.color = sel ? '#e3c9a4' : '#9e5d00';
    if (sel) {
      const pill = document.getElementById('spicePill');
      pill.style.left = l.offsetLeft + 'px';
      pill.style.width = l.offsetWidth + 'px';
    }
  });
}

function toggleCondiment(name, el) {
  if (el.dataset.animating === '1') return;
  const idx = state.condiments.indexOf(name);
  const def = condDefs.find(c => c.name === name);
  const img = el.querySelector('img');
  const adding = idx === -1;
  const newSrc = adding ? def.s : def.u;
  const duration = 400;

  el.dataset.animating = '1';
  img.style.backfaceVisibility = 'hidden';
  img.style.transition = 'transform '+(duration/1000)+'s cubic-bezier(0.4,0,0.2,1)';
  img.style.transform = 'rotateY(360deg)';

  setTimeout(() => {
    if (adding) {
      state.condiments.push(name);
    } else {
      state.condiments.splice(idx, 1);
    }
    img.src = newSrc;
    updateBowlOverlays();
    updatePrice();
  }, duration * 0.5);

  img.addEventListener('transitionend', function handler() {
    img.removeEventListener('transitionend', handler);
    img.style.transition = '';
    img.style.transform = '';
    img.style.backfaceVisibility = '';
    el.dataset.animating = '';
  });
}

function switchTab(name) {
  setTimeout(preloadAllAssets, 0);
  var currentTab = navTabs.find(function(t) { return t.active; });

  if (currentTab && currentTab.name === '首页' && name === '菜单') {
    var overlay = document.getElementById('loadingOverlay');
    var gif = overlay ? overlay.querySelector('.loading-gif') : null;
    var text = overlay ? overlay.querySelector('.loading-text') : null;
    if (gif) gif.src = '小猪搅拌面条_nobg_opt.gif';
    if (text) text.textContent = '正在准备美味...';
    if (overlay) overlay.classList.add('show');
    // Delay page switch until overlay is visible
    setTimeout(function() { doSwitchTab(name); }, 600);
    var preloadRounds = 0, maxRounds = 5;
    function preloadTick() {
      preloadAllAssets();
      preloadRounds++;
      if (preloadRounds < maxRounds) setTimeout(preloadTick, 200);
    }
    setTimeout(preloadTick, 100);
    setTimeout(function() {
      if (overlay) overlay.classList.add('fade-out');
      setTimeout(function() {
        if (overlay) { overlay.classList.remove('show'); overlay.classList.remove('fade-out'); }
      }, 400);
    }, 1500);
    return;
  }

  doSwitchTab(name);
}

function doSwitchTab(name) {
  navTabs.forEach(t => t.active = (t.name === name));
  renderNav();
  closeCartPanel();
  // Always clean up overlay pages
  var wp = document.getElementById('page-waiting');
  if (wp.classList.contains('show')) { wp.classList.remove('show'); wp.style.display = 'none'; wp.style.pointerEvents = 'none'; if (_loopRaf) { cancelAnimationFrame(_loopRaf); _loopRaf = 0; } }
  var cf = document.getElementById('page-confirm');
  if (cf.classList.contains('show')) { cf.classList.remove('show'); }
  var dt = document.getElementById('page-detail');
  if (dt.classList.contains('show')) { dt.classList.remove('show'); }
  var pageMap = { '菜单':'page-menu', '订单':'page-order', '我的':'page-me' };
  const app = document.querySelector('.app');
  var nbg = document.querySelector('.nav-bar-bg'); if (nbg) nbg.classList.remove('show');

  if (name === '首页') {
    // Going to home: reveal home, fade out old tab pages on top
    app.classList.remove('on-menu');
    app.classList.remove('is-menu');
    Object.keys(pageMap).forEach(function(tabName) {
      var pageEl = document.getElementById(pageMap[tabName]);
      if (!pageEl || pageEl.style.display !== 'block') return;
      pageEl.style.zIndex = '11';
      pageEl.style.opacity = '0';
      setTimeout(function() { pageEl.style.display = 'none'; pageEl.style.zIndex = ''; }, 350);
    });
  } else {
    // Going to a tab page: fade in new on top
    var incomingEl = document.getElementById(pageMap[name]);
    if (incomingEl) {
      incomingEl.style.display = 'block';
      incomingEl.style.zIndex = '11';
      incomingEl.style.opacity = '0';
      incomingEl.offsetHeight;
      incomingEl.style.opacity = '1';
      if (name === '菜单') {
        app.classList.add('is-menu');
        if (!state._menuRendered) { renderMenuCards(); state._menuRendered = true; }
      } else {
        app.classList.remove('is-menu');
      }
      setTimeout(function() {
        Object.keys(pageMap).forEach(function(tabName) {
          if (tabName === name) return;
          var pageEl = document.getElementById(pageMap[tabName]);
          if (!pageEl || pageEl.style.display !== 'block') return;
          pageEl.style.display = 'none'; pageEl.style.zIndex = '';
        });
        incomingEl.style.zIndex = '10';
        app.classList.add('on-menu');
      }, 350);
    }
  }
  if (name === '首页') {
    bgm.init().then(() => bgm.play());
  } else {
    bgm.stop();
  }
  if (name === '订单') renderOrderPage();
  if (name === '我的') renderMePage();
}

function rebuyOrder(idx) {
  var order = state.orderHistory[idx];
  if (!order) return;
  order.items.forEach(function(item) {
    var existing = state.menuCart.find(function(i) { return i.id === item.id && i.spec === item.spec; });
    if (existing) {
      existing.qty = (existing.qty || 1) + (item.qty || 1);
    } else {
      state.menuCart.push({
        id: item.id, name: item.name, price: item.price,
        qty: item.qty || 1, spec: item.spec || ''
      });
    }
  });
  updateMenuCart();
  switchTab('菜单');
  setTimeout(function() {
    if (state.menuCart.length > 0) openCartPanel();
  }, 400);
}

  state.orderHistory.forEach(function(order) {

      if (!seen[item.id] && item.spec) {
        seen[item.id] = true;
        favItems.push(item);
      }
    });
  });
  if (favItems.length === 0) {
    favList.innerHTML = '<div style="font-size:12px;color:#B4B4B4;text-align:center;padding:20px 0;">下单后这里会出现你常点的美味~</div>';
    return;
  }
  var html = '';
  favItems.forEach(function(item) {
    html += '<div class="me-fav-item">'+
      '<div class="me-fav-thumb"><img src="'+getCartImg(item.name)+'" alt="" onerror="this.src=\'购物车菜品/清空.webp\'"></div>'+

function _condimentPos(n) {
  if (n === '芝麻') return 'left:50%;top:50%;transform:translate(-50%,-50%);';
  if (n === '豌豆') return 'left:130px;top:96px;transform:translate(-50%,-50%);';
  let h = 0; for (let i = 0; i < n.length; i++) h = ((h << 5) - h + n.charCodeAt(i)) | 0;
  var angle = (h * 2.39996) % (Math.PI * 2);
  var dist = 20 + ((h * 3.14159) % 56);
  return 'left:'+(96+Math.cos(angle)*dist)+'px;top:'+(96+Math.sin(angle)*dist)+'px;transform:translate(-50%,-50%);';
}

function _toppingHTML(n, pos, isNew) {
  var isZajiang = n === '杂酱';
  var hw = isZajiang ? 42.5 : 60;
  var szStyle = isZajiang ? 'width:85px;height:85px;' : '';
  var animClass = isNew ? ' class="spin-in"' : '';
  var animVars = isNew ? '--sx:'+(96-pos[0])+'px;--sy:'+(96-pos[1])+'px;' : '';
  return '<img src="碗里浇头/'+n+'.webp" alt="'+n+'"'+animClass+' style="left:'+(pos[0]-hw)+'px;top:'+(pos[1]-hw)+'px;'+szStyle+animVars+'">';
}

function _condimentHTML(n) {
  var sz = n === '豌豆' ? 'width:80px;height:80px;' : '';
  return '<img src="碗里小料/'+n+'.webp" alt="'+n+'" style="'+_condimentPos(n)+sz+'">';
}

function updateBowlOverlays() {
  var portionSizes = {中份:170, 大份:190, 巨大:210};
  var ps = portionSizes[state.portion] || 192;
  var hasSuanlafen = state.toppings.includes('酸辣粉');

  // 酸辣粉
  var slfEl = document.getElementById('bowlSuanlafen');
  if (hasSuanlafen) {
    if (!slfEl._hasSLF) {
      slfEl.innerHTML = '<img src="碗里浇头/酸辣粉.webp" alt="酸辣粉" style="width:'+ps+'px;height:'+ps+'px;left:50%;top:50%;transform:translate(-50%,-50%);">';
      slfEl._hasSLF = true;
    }
    slfEl.style.display = '';
  } else {
    slfEl._hasSLF = false;
    slfEl.innerHTML = '';
    slfEl.style.display = 'none';
  }

  // Toppings — incremental update
  var otherToppings = state.toppings.filter(function(n) { return n !== '酸辣粉'; });
  var prevSet = new Set(state._prevBowlToppings || []);
  var spinIns = new Set(otherToppings.filter(function(n) { return !prevSet.has(n); }));
  state._prevBowlToppings = otherToppings.slice();

  var tpEl = document.getElementById('bowlToppings');
  var currentImgs = tpEl.querySelectorAll('img');
  var currentNames = new Set();
  currentImgs.forEach(function(img) { currentNames.add(img.alt); });

  // Remove toppings no longer selected
  currentImgs.forEach(function(img) {
    if (otherToppings.indexOf(img.alt) === -1) img.remove();
  });

  // Add new toppings
  otherToppings.forEach(function(n) {
    if (!currentNames.has(n)) {
      var pos;
      if (n === '杂酱') { pos = [96, 96]; }
      else { var si = state.toppingSlots[n]; pos = (si != null) ? bowlSlots[si] : [Math.random()*120+36, Math.random()*120+36]; }
      var isNew = spinIns.has(n);
      tpEl.insertAdjacentHTML('beforeend', _toppingHTML(n, pos, isNew));
    }
  });

  // Condiments — incremental update
  var bowlCondiments = state.condiments.filter(function(n) { return !(hasSuanlafen && n === '花生'); });
  var cdEl = document.getElementById('bowlCondiments');
  var cdImgs = cdEl.querySelectorAll('img');
  var cdNames = new Set();
  cdImgs.forEach(function(img) { cdNames.add(img.alt); });

  cdImgs.forEach(function(img) {
    if (bowlCondiments.indexOf(img.alt) === -1) img.remove();
  });
  bowlCondiments.forEach(function(n) {
    if (!cdNames.has(n)) cdEl.insertAdjacentHTML('beforeend', _condimentHTML(n));
  });

  document.getElementById('bowlNoodles').style.display = hasSuanlafen ? 'none' : '';
  document.getElementById('bowlBroth').style.display = (state.method === '干' || hasSuanlafen) ? 'none' : '';
}

function calcPrice() {
  let price = 8; // 素面
  if (state.toppings.length > 0) {
    const first = state.toppings[0];
    const tp = toppingPrices[first];
    price = tp ? tp.combo : 8;
    for (let i = 1; i < state.toppings.length; i++) {
      const t = state.toppings[i];
      price += (toppingPrices[t] || {}).indiv || 0;
    }
  }
  state.condiments.forEach(c => {
    price += condimentPrices[c] || 0;
  });
  const portion = {中份:0, 大份:3, 巨大:6}[state.portion] || 0;
  var total = price + portion;
  if (state.dineType === '外带') total += 1;
  return total;
}

// Load assets with concurrency control and progress tracking
function loadAssetsTracked(urls, onProgress, onDone) {
  // Filter out already-preloaded URLs
  var remaining = [];
  for (var i = 0; i < urls.length; i++) {
    if (urls[i] && !_preloaded[urls[i]]) remaining.push(urls[i]);
  }
  var total = remaining.length;
  if (total === 0) { if (onDone) onDone(); return; }

  var done = 0, nextIdx = 0, active = 0;
  var MAX = 6;

  function onOneDone() {
    done++;
    active--;
    if (onProgress) onProgress(done, total);
    pump();
  }

  function pump() {
    while (active < MAX && nextIdx < remaining.length) {
      var url = remaining[nextIdx++];
      active++;
      _preloaded[url] = true;
      var img = new Image();
      img.onload = onOneDone;
      img.onerror = onOneDone;
      img.src = url;
    }
    if (done >= total && onDone) { var cb = onDone; onDone = null; cb(); }
  }

  pump();
}

// Fire-and-forget preload (for switchTab / dismissSplash)
function preloadAllAssets() {
  loadAssetsTracked(collectAllAssetUrls(), null, null);
}

// ===== Loading Page =====
function initLoadingPage() {
  var page = document.getElementById('loadingPage');
  var bar = document.getElementById('loadingBarFill');
  var pct = document.getElementById('loadingPct');
  var tip = document.getElementById('loadingTip');
  if (!page || !bar || !pct) return;

  // Collect all asset URLs first (fast, synchronous)
  var allUrls = [];
  try { allUrls = collectAllAssetUrls(); } catch(e) { console.warn('collectAllAssetUrls error:', e); }

  var total = 0;
  for (var i = 0; i < allUrls.length; i++) {
    if (allUrls[i] && !_preloaded[allUrls[i]]) total++;
  }

  if (total === 0) {
    // Everything's already cached — skip loading page immediately
    page.classList.add('hide');
    setTimeout(function() { page.classList.add('done'); }, 500);
    return;
  }

  var startTime = Date.now();
  var minShowTime = 500;
  var maxWaitTime = 8000; // dismiss after 8s max, keep loading in background

  // Random tips while loading
  var tips = ['面条正在擀制中...','高汤正在熬制中...','辣椒正在翻炒中...','花生正在剥壳中...','牛肉正在卤制中...','红油正在炼制中...','臊子正在炒制中...','香菜正在切碎中...'];
  var tipIdx = 0;
  tip.textContent = tips[0];
  var tipTimer = setInterval(function() {
    tipIdx = (tipIdx + 1) % tips.length;
    tip.textContent = tips[tipIdx];
  }, 1200);

  var finished = false;
  var realDone = 0;
  var realTotal = total;

  function finish() {
    if (finished) return;
    finished = true;
    clearInterval(tipTimer);
    clearInterval(progressTimer);
    clearTimeout(safetyTimer);
    clearTimeout(maxTimer);
    tip.textContent = '';
    bar.style.width = '100%';
    pct.textContent = '完成!';

    var elapsed = Date.now() - startTime;
    var remaining = Math.max(0, minShowTime - elapsed);
    setTimeout(function() {
      page.classList.add('hide');
      setTimeout(function() { page.classList.add('done'); }, 500);
    }, remaining);

    // Continue preloading remaining assets in background
    if (realDone < realTotal) {
      setTimeout(function() { preloadAllAssets(); }, 1000);
    }
  }

  // Max wait: dismiss loading page after 8s no matter what
  var maxTimer = setTimeout(function() {
    console.warn('[preload] Max wait (' + maxWaitTime + 'ms) reached, ' + realDone + '/' + realTotal + ' loaded — dismissing');
    finish();
  }, maxWaitTime);

  // Safety fallback: dismiss after 15s (in case maxTimer fails somehow)
  var safetyTimer = setTimeout(function() {
    console.warn('[preload] Safety timeout (15s) — force dismissing');
    finish();
  }, 15000);

  // Simulate progress even if real loading stalls (so bar never looks frozen)
  var simPct = 0;
  var progressTimer = setInterval(function() {
    if (simPct < 90) {
      simPct += Math.max(1, (90 - simPct) * 0.06);
      bar.style.width = Math.round(simPct) + '%';
      pct.textContent = Math.round(simPct) + '%';
    }
  }, 400);

  loadAssetsTracked(allUrls, function(done, totalCount) {
    realDone = done;
    var realPct = Math.round((done / totalCount) * 100);
    // Jump simulated progress to match real progress (but never go backwards)
    if (realPct > simPct) simPct = realPct;
    bar.style.width = Math.round(simPct) + '%';
    pct.textContent = Math.round(simPct) + '%';
  }, function() {
    realDone = realTotal;
    clearTimeout(maxTimer);
    clearTimeout(safetyTimer);
    finish();
  });

  // Tap to skip (emergency escape for users)
  page.style.pointerEvents = 'auto';
  page.addEventListener('click', function skipOnTap(e) {
    if (finished) return;
    console.log('[preload] User tapped to skip loading');
    finish();
    page.removeEventListener('click', skipOnTap);
  });
  page.addEventListener('touchend', function skipOnTouch(e) {
    if (finished) return;
    console.log('[preload] User touched to skip loading');
    finish();
    page.removeEventListener('touchend', skipOnTouch);
  });
}

function confirmToggleDine(type) {
  if (_confirmDineType === type) return;
  _confirmDineType = type;
  state.dineType = type;
  updateMenuCart();

  var body = document.getElementById('confirmBody');
  if (!body) return;

  var dineBtn = body.querySelector('.confirm-dine-option img[alt="堂食"]');
  var takeoutBtn = body.querySelector('.confirm-dine-option img[alt="外带"]');
  if (dineBtn) { dineBtn.src = type === '堂食' ? '确认订单/堂食选择后.webp?v=2' : '确认订单/堂食选择前.webp?v=2'; dineBtn.parentElement.classList.toggle('dine-sel', type==='堂食'); }
  if (takeoutBtn) { takeoutBtn.src = type === '外带' ? '确认订单/外带选择后.webp?v=2' : '确认订单/外带选择前.webp?v=2'; takeoutBtn.parentElement.classList.toggle('dine-sel', type==='外带'); }

  // Recalculate total
  var items = state.menuCart.length > 0 ? state.menuCart : [];
  var total = items.reduce(function(s, i) { return s + i.price * (i.qty || 1); }, 0);
  if (type === '外带') total += 1;

  // Show/hide 外带 row
  var takeoutRow = body.querySelector('.confirm-takeout-row');
  if (type === '外带') {
    if (!takeoutRow) {
      var divider = body.querySelector('.confirm-order-divider');
      if (divider && divider.parentNode) {
        var row = document.createElement('div');
        row.className = 'confirm-takeout-row';
        row.innerHTML = '<span>外带</span><span>+¥1.0</span>';
        divider.parentNode.insertBefore(row, divider);
      }
    }
  } else {
    if (takeoutRow && takeoutRow.parentNode) takeoutRow.parentNode.removeChild(takeoutRow);
  }

  // Update price displays
  var subtotalEl = body.querySelector('.confirm-order-subtotal-price');
  if (subtotalEl) subtotalEl.textContent = '¥' + Number(total).toFixed(1);
  var priceEls = body.querySelectorAll('.confirm-row-value.price');
  for (var i = 0; i < priceEls.length; i++) {

  var confirmTotal = document.getElementById('confirmTotal');
  if (confirmTotal) confirmTotal.textContent = '合计 ¥' + Number(total).toFixed(1);
