    if (otm === 20) { _rankY = -350; _rankVy = 0; _rankBounce = 0; _rankDone = false; }
    if (otm > 20 && !_rankDone) {
      var rankTarget = uiCurrY + 90 + 24 + 26;
      _rankVy += 3; _rankY += _rankVy;
      if (_rankY >= rankTarget) {
        _rankY = rankTarget; _rankBounce++;
        if (_rankBounce >= 3) { _rankDone = true; }
        else { _rankVy = -_rankVy * (0.55 / _rankBounce); }
      }
    }
    if (otm === 21) { obtn.style.display = 'flex'; sbtn.style.display = 'none'; } return;
  }
  if (gs !== ST.PLAY) return;
  fc++; var ts = IS + Math.floor(score/250)*0.6; spd += (Math.min(ts, MS)-spd)*0.05;
  pig.vy += GR; pig.y += pig.vy; if (pig.y >= GY-pig.h) { pig.y = GY-pig.h; pig.vy = 0; pig.jumping = false; }
  if (fc >= nObs) { spw(); var mn = Math.max(50, 120-Math.floor(spd*4)), mx = Math.max(80, 180-Math.floor(spd*4)); nObs = fc+mn+Math.floor(Math.random()*(mx-mn)); }
  for (var i = obs.length-1; i >= 0; i--) { obs[i].x -= spd; if (obs[i].x+obs[i].w < 0) { obs.splice(i,1); continue; } if (pot.x+pot.w > obs[i].x && pot.x < obs[i].x+obs[i].w) { obs.splice(i,1); } }
  mtn -= spd*0.3; var mw = 729*(100/152); if (mtn <= -mw) mtn += mw;
  if (inv > 0) inv--;
  if (inv === 0) { var ph = {x:pig.x+10, y:pig.y+8, w:pig.w-20, h:pig.h-12}; for (var j = obs.length-1; j >= 0; j--) { var o = obs[j], oh = {x:o.x+4, y:o.y+4, w:o.w-8, h:o.h-8}; if (ph.x < oh.x+oh.w && ph.x+ph.w > oh.x && ph.y < oh.y+oh.h && ph.y+ph.h > oh.y) { lives--; inv = IF; obs.splice(j,1); if (lives <= 0) { gs = ST.OVER; return; } } } }
  score += spd*0.5;
}

function upPig(){
  if (gs === ST.EMPTY) { pge.style.display = 'none'; pgeIdle.style.display = 'none'; return; }
  if (gs === ST.IDLE) {
    pge.style.display = 'none';
    pgeIdle.style.display = ''; pgeIdle.src = P.pigStand;
    pgeIdle.style.left = '36px'; pgeIdle.style.top = '754px'; pgeIdle.style.width = '55px'; pgeIdle.style.height = '39px';
    return;
  }
  pgeIdle.style.display = 'none';
  var showRun = gs === ST.PLAY && !pig.jumping && !(inv>0 && Math.floor(inv/5)%2===0);
  if (showRun) { pge.style.display = ''; if (pge.getAttribute('d') !== P.pigRun) { pge.src = P.pigRun; pge.setAttribute('d', P.pigRun); } pge.style.left = pig.x+'px'; pge.style.top = (GY-59+gyOffset)+'px'; pge.style.width = '85px'; pge.style.height = '59px'; }
  else { pge.style.display = 'none'; }
}
function upPot(){
  if (gs === ST.OVER || gs === ST.EMPTY) { pte.style.display = 'none'; pteIdle.style.display = 'none'; return; }
  if (gs === ST.IDLE) {
    pte.style.display = 'none';
    pteIdle.style.display = ''; pteIdle.src = 'dino-assets/锅的原始状态.webp';
    pteIdle.style.left = '12px'; pteIdle.style.top = '752px'; pteIdle.style.width = '85px'; pteIdle.style.height = '93px'; pteIdle.style.transform = '';
    return;
  }
  pteIdle.style.display = 'none';
  pte.style.display = '';
  if (pte.getAttribute('d') !== P.pot) { pte.src = P.pot; pte.setAttribute('d', P.pot); }
  pte.style.left = pot.x+'px'; pte.style.top = (GY-pot.h+10+gyOffset)+'px'; pte.style.width = pot.w+'px'; pte.style.height = pot.h+'px'; pte.style.transform = '';
}

function dBg(){
  // Only show Figma-exported bg during IDLE/EMPTY — during PLAY/OVER the static
  // pig/pot/veggies in the export would ghost behind the animated sprites.
  if (gs === ST.IDLE || gs === ST.EMPTY) {
    if (IMG.bg) { bctx.drawImage(IMG.bg, 0, 0, W, H); return; }
  }
  var g = bctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#F4E9E6'); g.addColorStop(0.6,'#ECDCC0'); g.addColorStop(1,'#D4A574'); bctx.fillStyle = g; bctx.fillRect(0,0,W,H);
}
function dHeader(){
  bctx.textAlign = 'left';
}
function dOver(){
  var curY = uiCurrY, cy = Math.round(curY);
  if (IMG.gameOver) { var gh = 80, gw = gh*(IMG.gameOver.width/IMG.gameOver.height); ctx.drawImage(IMG.gameOver, W/2-gw/2, cy-10, gw, gh); }
  var ds = Math.floor(score/10); if (ds > best) { best = ds; try { localStorage.setItem('pigRunBest', ds); } catch(e) {} }
  var lx = W/2-70, ly = cy+90;
  if (IMG.scoreLabel) { var sh = 14, sw = sh*(IMG.scoreLabel.width/IMG.scoreLabel.height); ctx.drawImage(IMG.scoreLabel, lx, ly, sw, sh); ctx.fillStyle = '#CA2626'; ctx.font = 'bold 15px "PingFang SC","Microsoft YaHei",sans-serif'; ctx.textAlign = 'left'; ctx.fillText(ds, lx+sw+64, ly+12); }
  var ly2 = ly+24;
  if (IMG.recordLabel) { var rh = 14, rw = rh*(IMG.recordLabel.width/IMG.recordLabel.height); ctx.drawImage(IMG.recordLabel, lx, ly2, rw, rh); ctx.fillStyle = '#CA2626'; ctx.font = 'bold 15px "PingFang SC","Microsoft YaHei",sans-serif'; ctx.textAlign = 'left'; ctx.fillText(best, lx+rw+64, ly2+12); }
  if (IMG.rankBtn) { var rankY = !_rankDone ? _rankY : (ly2+26); ctx.drawImage(IMG.rankBtn, W/2-IMG.rankBtn.width/4, rankY, IMG.rankBtn.width/2, IMG.rankBtn.height/2); }
  ctx.textAlign = 'left';
}

var ovlTargetH = 300, ovlCurrH = 300;
var uiTargetY = GY-140, uiCurrY = GY-140;
var mtnTargetY = 0, mtnOffset = 0;
var gyOffset = 0, gyTargetY = 0;
var _rankY = -300, _rankVy = 0, _rankBounce = 0, _rankDone = true;

function dMtn(){ if (!IMG.mountain) return; var h = 100, w = 729*(h/152), y = GY-pot.h+110-h; y += mtnOffset; ctx.drawImage(IMG.mountain, mtn, y, w, h); ctx.drawImage(IMG.mountain, mtn+w, y, w, h); }
function dObs(){ for (var i=0;i<obs.length;i++){ var o=obs[i], im=IMG[o.k]; if(!im) continue; ctx.save(); ctx.translate(o.x+o.w/2, o.y+o.h/2+gyOffset); ctx.rotate(Math.sin(o.x*0.05)*0.08); ctx.drawImage(im, -o.w/2, -o.h/2, o.w, o.h); ctx.restore(); } }
function dPig(){ if (inv>0 && Math.floor(inv/5)%2===0) return; if (!pig.jumping && gs===ST.PLAY) return; if (gs===ST.IDLE) return; var im, iw, ih, ix, iy; if (pig.jumping && IMG.pigJump) { im=IMG.pigJump; iw=100; ih=100; ix=pig.x-10; iy=GY-ih+(pig.y-(GY-pig.h))*0.8+gyOffset; } else if (IMG.pigStand) { im=IMG.pigStand; iw=80; ih=55; ix=pig.x; iy=pig.y+gyOffset; } else return; ctx.drawImage(im, ix, iy, iw, ih); }
function dUI(){
  var curY = uiCurrY; curY += (uiTargetY-curY)*0.08; uiCurrY = curY;
  var yy = Math.round(curY), bw = 128, bh = 40, bx = 16, by = yy+2, br = bh/2;
  ctx.strokeStyle = '#B8865A'; ctx.lineWidth = 1; ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, br); ctx.stroke();
  ctx.fillStyle = '#B8865A'; ctx.textAlign = 'left';
  ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif'; ctx.fillText('分数', bx+14, by+bh/2+5);
  ctx.font = 'bold 20px "PingFang SC","Microsoft YaHei",sans-serif'; ctx.fillText(Math.floor(score/10), bx+66, by+bh/2+7);
  var hs = 36, hy = yy+4, hx0 = W-15-hs*2-8;
  for (var i = 0; i < 2; i++) { var hx = hx0+i*(hs+6), hi = i<lives ? IMG.heartF : IMG.heartE; if (hi) ctx.drawImage(hi, hx, hy, hs, hs); else { ctx.fillStyle = i<lives ? '#FF4444' : '#666'; ctx.beginPath(); ctx.arc(hx+hs/2, hy+hs/2, hs/2-2, 0, Math.PI*2); ctx.fill(); } }
}
function drawBg(){ bctx.clearRect(0,0,W,H); dBg(); dHeader(); }
function dVeggiesIdle(){
  if (gs !== ST.IDLE) return;
  // Figma positions scaled 2x (402px wide)
  var veggies = [
    {k:'garlic', x:244, w:30, h:28},
    {k:'radish', x:278, w:34, h:34},
    {k:'onion', x:348, w:24, h:34},
  ];
  for (var i = 0; i < veggies.length; i++) {
    var v = veggies[i], im = IMG[v.k];
    if (!im) continue;
    var vy = GY - v.h + gyOffset;
    ctx.drawImage(im, v.x, vy, v.w, v.h);
  }
}
function drawGame(){ ctx.clearRect(0,0,W,H); if (gs===ST.EMPTY) return; dMtn(); dVeggiesIdle(); if (gs===ST.IDLE||gs===ST.PLAY||gs===ST.OVER) dPig(); if (gs===ST.PLAY) { dObs(); dUI(); } if (gs===ST.OVER) dObs(); if (gs===ST.OVER&&otm>20) dOver(); }
function draw(){ drawBg(); drawGame(); }

function setupDOM(){
  // Hide hero/store-info/gradient — all baked into the Figma-exported canvas bg image
  var heroImg = document.getElementById('waiting-hero');
  if (heroImg) heroImg.style.display = 'none';
  var storeInfo = document.querySelector('.waiting-store-info');
  if (storeInfo) storeInfo.style.display = 'none';
  var waitingTop = document.getElementById('waiting-top');
  if (waitingTop) waitingTop.style.display = 'none';

  // Minimal scroll area — status bar and card are in the Figma bg image
  sinner.innerHTML = '<div style="height:700px;"></div>';
  scr.style.top = SCR_Y+'px';
  scr.style.height = (H-SCR_Y)+'px';
  sbtn.style.left = '136px'; sbtn.style.top = '710px'; sbtn.style.width = '140px'; sbtn.style.height = '46px'; sbtn.style.display = 'flex';
}
function endGame(){ resetToIdle(); }

sbtn.addEventListener('click', function(e){ e.stopPropagation(); if (gs===ST.IDLE) start(); });
sbtn.addEventListener('touchstart', function(e){ e.stopPropagation(); e.preventDefault(); if (gs===ST.IDLE) start(); });
rbtn.addEventListener('click', function(e){ e.stopPropagation(); if (gs===ST.OVER&&otm>20) start(); });
rbtn.addEventListener('touchstart', function(e){ e.stopPropagation(); e.preventDefault(); if (gs===ST.OVER&&otm>20) start(); });
ebtn.addEventListener('click', function(e){ e.stopPropagation(); resetToIdle(); });
ebtn.addEventListener('touchstart', function(e){ e.stopPropagation(); e.preventDefault(); resetToIdle(); });
if (backBtn) backBtn.addEventListener('touchstart', function(e){ e.stopPropagation(); e.preventDefault(); hideWaitingPage(); });

function handleGI(e){
  if (e.target.closest('#dino-start-dom') || e.target.closest('#dino-replay-dom') || e.target.closest('#dino-end-dom') || e.target.closest('.waiting-back-btn')) return;
  if (gs === ST.PLAY) jp();
  else if (gs === ST.OVER && otm > 20) start();
}
container.addEventListener('click', handleGI);
container.addEventListener('touchstart', function(e){ if (e.target.closest('#dino-start-dom')||e.target.closest('#dino-replay-dom')||e.target.closest('.waiting-back-btn')) return; e.preventDefault(); handleGI(e); }, {passive:false});
container.addEventListener('touchmove', function(e){ if (e.target.closest('#dino-scroll')) return; e.preventDefault(); }, {passive:false});
document.addEventListener('keydown', function(e){ if (e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') { e.preventDefault(); if (gs===ST.IDLE) start(); else if (gs===ST.OVER&&otm>20) start(); else jp(); } });

function start(){ rst(); gs = ST.PLAY; sbtn.style.display = 'none'; obtn.style.display = 'none'; bovl.style.display = ''; cv.style.display = ''; pge.style.display = ''; pte.style.display = ''; pgeIdle.style.display = 'none'; pteIdle.style.display = 'none'; ovlTargetH = H; uiTargetY = GY-640; mtnTargetY = -200; gyTargetY = -50;
  document.getElementById('navBar').style.display = 'none'; container.style.zIndex = '300';
  var nbg = document.querySelector('.nav-bar-bg'); if (nbg) nbg.classList.remove('show');
}
function resetToIdle(){ rst(); gs = ST.EMPTY; sbtn.style.display = 'none'; obtn.style.display = 'none'; ovlTargetH = 300; uiTargetY = GY-140; mtnTargetY = 0; gyTargetY = 0; bovl.style.display = 'none'; cv.style.display = 'none'; pte.style.display = 'none'; pge.style.display = 'none'; pgeIdle.style.display = 'none'; pteIdle.style.display = 'none';
  if (_loopRaf) { cancelAnimationFrame(_loopRaf); _loopRaf = 0; }
  document.getElementById('navBar').style.display = ''; container.style.zIndex = '100';
  var nbg = document.querySelector('.nav-bar-bg'); if (nbg) nbg.classList.add('show');
  var tt = document.querySelector('.waiting-top-title'); if (tt) tt.style.display = 'none';
}
var _loopRaf = 0;
function loop(){ if (!container.classList.contains('show')) { _loopRaf = 0; return; }
  upd(); upPig(); upPot();
  ovlCurrH += (ovlTargetH-ovlCurrH)*0.08; bovl.style.height = Math.round(ovlCurrH)+'px';
  mtnOffset += (mtnTargetY-mtnOffset)*0.08;
  gyOffset += (gyTargetY-gyOffset)*0.08;
  draw();
  if (!container.classList.contains('show')) { _loopRaf = 0; return; }
  _loopRaf = requestAnimationFrame(loop); }


window._dinoGameReady = false;
window._dinoOrderItems = [];
window.showWaitingPage = function(items){
  window._dinoOrderItems = items || [];
  var el = document.getElementById('page-waiting');
  el.style.display = 'block';
  el.style.pointerEvents = '';
  el.offsetHeight; // force reflow
  el.classList.add('show');
  document.getElementById('navBar').style.display = 'none';
  container.style.zIndex = '300';
  var nbg = document.querySelector('.nav-bar-bg'); if (nbg) nbg.classList.remove('show');
  if (!window._dinoGameReady) {
    window._dinoGameReady = true;
    load().then(function(){
      ld.style.display = 'none';
      rst(); gs = ST.IDLE;
      setupDOM();
      var tt = document.querySelector('.waiting-top-title'); if (tt) tt.style.display = '';
      requestAnimationFrame(loop);
    });
  } else {
    setupDOM();
    rst(); gs = ST.IDLE;
    sbtn.style.display = 'flex'; obtn.style.display = 'none';
    bovl.style.display = ''; cv.style.display = ''; pge.style.display = ''; pte.style.display = '';
    ovlTargetH = 300; uiTargetY = GY-140; mtnTargetY = 0; gyTargetY = 0;
    ovlCurrH = 300; uiCurrY = GY-140; mtnOffset = 0; gyOffset = 0;
    var tt = document.querySelector('.waiting-top-title'); if (tt) tt.style.display = '';
    // 重新启动游戏循环
    if (_loopRaf) { cancelAnimationFrame(_loopRaf); }
    _loopRaf = requestAnimationFrame(loop);
  }
};
window.hideWaitingPage = function(){
  var el = document.getElementById('page-waiting');
  el.classList.remove('show');
  el.style.display = 'none';
  el.style.pointerEvents = 'none';
  el.style.zIndex = '0';
  // 停止游戏循环
  if (_loopRaf) { cancelAnimationFrame(_loopRaf); _loopRaf = 0; }
  // 确保导航栏可见
  document.getElementById('navBar').style.display = '';
  document.getElementById('navBar').style.zIndex = '102';
  var nbg = document.querySelector('.nav-bar-bg'); if (nbg) nbg.classList.add('show');
  // 先隐藏菜单页，避免跳转订单页时短暂露出
  var menuPage = document.getElementById('page-menu');
  if (menuPage && menuPage.style.display === 'block') {
    menuPage.style.display = 'none';
    menuPage.style.zIndex = '';
  }
  doSwitchTab('订单');
  var orderPage = document.getElementById('page-order');
  if (orderPage) orderPage.scrollTop = 0;
};
})();
</script>
